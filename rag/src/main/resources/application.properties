spring.application.name=rag
# Server
server.port=8082

# ============= CONEXIÓN A POSTGRES (CONTENEDOR) =============
# Cambia localhost por la IP real de tu servidor Fedora
spring.datasource.url=jdbc:postgresql://[IP_ADDRESS]:25432/postgres
spring.datasource.username=postgres
spring.datasource.password=<YOUR_DB_PASSWORD>
spring.datasource.driver-class-name=org.postgresql.Driver


# ============= PGVECTOR CONFIGURATION =============
# Spring AI creará la tabla 'vector_store' automáticamente si no existe
spring.ai.vectorstore.pgvector.table-name=vector_store
# Cambia 'hnsw' por 'HNSW' (por precaución con el case-sensitivity)
spring.ai.vectorstore.pgvector.index-type=HNSW
# EL FIX: Cambia 'cosine' por 'COSINE_DISTANCE'
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=384

# ============= OLLAMA CONFIGURATION =============
spring.ai.ollama.base-url=http://[IP_ADDRESS]:11434
spring.ai.ollama.chat.model=qwen2.5:3b
spring.ai.ollama.chat.options.temperature=0.7

# ============= EMBEDDING MODEL =============
spring.ai.embedding.transformer.onnx.modelUri=https://huggingface.co/intfloat/multilingual-e5-small/resolve/main/onnx/model.onnx
spring.ai.embedding.transformer.tokenizer.uri=https://huggingface.co/intfloat/multilingual-e5-small/resolve/main/tokenizer.json

# ============= LOGGING & OBSERVABILITY =============
logging.level.org.springframework.ai=DEBUG
logging.level.com.saamcito=DEBUG
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
spring.ai.chat.client.observations.enabled=true

# ============= FILE WATCHER =============
rag.document-watcher.path=./fedora-docs

# ============= RAG ADVANCED CONFIGURATION =============
rag.retrieval.topK=10
rag.retrieval.similarityThreshold=0.5
rag.retrieval.rrf.vectorWeight=0.5
rag.retrieval.rrf.keywordWeight=0.5

# ============= CROSS-ENCODER =============
rag.crossencoder.modelUri=https://huggingface.co/cross-encoder/ms-marco-MiniLM-L-6-v2/resolve/main/onnx/model.onnx
rag.crossencoder.tokenizerUri=https://huggingface.co/cross-encoder/ms-marco-MiniLM-L-6-v2/resolve/main/tokenizer.json

# ============= ACTUATOR / METRICS =============
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.metrics.enabled=true